syntax = "proto3";
package modl.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// --- Shared data types ---

message PunishmentEvidence {
  string type = 1;
  optional string text = 2;
  optional string url = 3;
  optional string uploaded_by = 4;
  optional string uploaded_by_id = 5;
  int64 uploaded_at = 6;
  optional string file_name = 7;
  optional string file_type = 8;
  optional int64 file_size = 9;
}

message PunishmentModification {
  string id = 1;
  string type = 2;
  int64 date = 3;
  optional string issuer_name = 4;
  optional string issuer_id = 5;
  string reason = 6;
  optional int64 effective_duration = 7;
  optional string appeal_ticket_id = 8;
  optional google.protobuf.Struct data = 9;
}

message PunishmentNote {
  string id = 1;
  string text = 2;
  int64 date = 3;
  optional string issuer_name = 4;
  optional string issuer_id = 5;
}

// --- Requests ---

message CreatePunishmentRequest {
  string target_uuid = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 36
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  optional string issuer_name = 2 [(buf.validate.field).string.max_len = 64];
  optional string issuer_id = 3 [(buf.validate.field).string.max_len = 64];
  int32 type_ordinal = 4 [
    json_name = "type_ordinal",
    (buf.validate.field).int32.gte = 0
  ];
  optional string reason = 5 [(buf.validate.field).string.max_len = 1000];
  optional int64 duration = 6 [(buf.validate.field).int64.gte = 0];
  optional google.protobuf.Struct data = 7;
  repeated string notes = 8 [(buf.validate.field).repeated = {
    max_items: 50
    items: {
      string: {max_len: 4000}
    }
  }];
  repeated string attached_ticket_ids = 9 [(buf.validate.field).repeated = {
    max_items: 50
    items: {
      string: {
        max_len: 64
        pattern: "(?s).*\\S.*"
      }
    }
  }];
  optional string severity = 10 [(buf.validate.field).string.max_len = 32];
  optional string status = 11 [(buf.validate.field).string.max_len = 32];
}

message PanelCreatePunishmentRequest {
  optional string issuer_name = 1;
  optional string issuer_id = 2;
  int32 type_ordinal = 3 [(buf.validate.field).int32.gte = 0];
  repeated CreateNoteRequest notes = 4;
  repeated CreateEvidenceRequest evidence = 5;
  repeated string attached_ticket_ids = 6;
  optional string severity = 7;
  optional string status = 8;
  optional google.protobuf.Struct data = 9;
  optional string reason = 10;
  optional int64 duration = 11;
}

message CreateNoteRequest {
  string text = 1 [(buf.validate.field).string.min_len = 1];
  optional string issuer_name = 2;
  optional string issuer_id = 3;
  optional string date = 4;
}

message CreateEvidenceRequest {
  string text = 1 [(buf.validate.field).string.min_len = 1];
  optional string issuer_name = 2;
  optional string issuer_id = 3;
  optional string date = 4;
  optional string type = 5;
  optional string file_url = 6;
  optional string file_name = 7;
  optional string file_type = 8;
  optional int64 file_size = 9;
}

message PardonPunishmentRequest {
  optional string issuer_name = 1 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  optional string issuer_id = 2 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  optional string reason = 3 [(buf.validate.field).string.max_len = 500];
  optional string expected_type = 4 [
    json_name = "expectedType",
    (buf.validate.field).string.max_len = 64
  ];
}

message PardonPlayerRequest {
  string player_name = 1;
  optional string issuer_name = 2;
  optional string issuer_id = 3;
  optional string punishment_type = 4;
  optional string reason = 5;
}

message AddPunishmentNoteRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  string note = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 4000
    pattern: "(?s).*\\S.*"
  }];
}

message AddPunishmentNoteResponse {
  int32 status = 1;
  optional bool success = 2;
  string message = 3;
}

message AddPunishmentEvidenceRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  string evidence_url = 4 [
    json_name = "evidenceUrl",
    (buf.validate.field).string = {
      min_len: 1
      max_len: 2048
      pattern: "(?s).*\\S.*"
    }
  ];
}

message AddPunishmentEvidenceResponse {
  int32 status = 1;
  optional bool success = 2;
  string message = 3;
}

message ChangePunishmentDurationRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  optional int64 new_duration = 4 [
    json_name = "newDuration",
    (buf.validate.field).int64.gte = 0
  ];
}

message ChangePunishmentDurationResponse {
  int32 status = 1;
  optional bool success = 2;
  string message = 3;
}

message TogglePunishmentOptionRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  string option = 4 [
    json_name = "option",
    (buf.validate.field).string = {
      min_len: 1
      max_len: 64
      pattern: "(?s).*\\S.*"
    }
  ];
  bool enabled = 5;
}

message TogglePunishmentOptionResponse {
  int32 status = 1;
  optional bool success = 2;
  string message = 3;
}

message PunishmentAcknowledgeRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string = {
      min_len: 1
      max_len: 64
      pattern: "(?s).*\\S.*"
    }
  ];
  string player_uuid = 2 [
    json_name = "playerUuid",
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
    }
  ];
  string executed_at = 3 [
    json_name = "executedAt",
    (buf.validate.field).string.max_len = 64
  ];
  optional string error_message = 4 [
    json_name = "errorMessage",
    (buf.validate.field).string.max_len = 500
  ];
  bool success = 5;
}

message StatWipeAcknowledgeRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string = {
      min_len: 1
      max_len: 64
      pattern: "(?s).*\\S.*"
    }
  ];
  optional string server_name = 2 [
    json_name = "serverName",
    (buf.validate.field).string.max_len = 64
  ];
  bool success = 3;
}

message CreateEvidenceUploadTokenRequest {
  optional string issuer_name = 1 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  optional string issuer_id = 2 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
}

message ModifyPunishmentTicketsRequest {
  string punishment_id = 1 [
    json_name = "punishmentId",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  repeated string add_ticket_ids = 4 [
    json_name = "addTicketIds",
    (buf.validate.field).repeated = {
      max_items: 50
      items: {
        string: {
          max_len: 64
          pattern: "(?s).*\\S.*"
        }
      }
    }
  ];
  repeated string remove_ticket_ids = 5 [
    json_name = "removeTicketIds",
    (buf.validate.field).repeated = {
      max_items: 50
      items: {
        string: {
          max_len: 64
          pattern: "(?s).*\\S.*"
        }
      }
    }
  ];
  bool modify_associated_tickets = 6;
}

message PanelAddModificationRequest {
  string type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  optional string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  optional string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  optional int64 effective_duration = 4 [
    json_name = "effectiveDuration",
    (buf.validate.field).int64.gte = 0
  ];
  optional string reason = 5 [(buf.validate.field).string.max_len = 500];
  optional string appeal_ticket_id = 6 [
    json_name = "appealTicketId",
    (buf.validate.field).string.max_len = 64
  ];
}

message PanelAddPunishmentNoteRequest {
  string text = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 4000
  }];
  optional string issuer_name = 2 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  optional string issuer_id = 3 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
}

message PanelAddEvidenceRequest {
  optional string text = 1 [(buf.validate.field).string.max_len = 4000];
  string type = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  optional string issuer_name = 3 [
    json_name = "issuerName",
    (buf.validate.field).string.max_len = 64
  ];
  optional string issuer_id = 4 [
    json_name = "issuerId",
    (buf.validate.field).string.max_len = 64
  ];
  optional string url = 5 [(buf.validate.field).string.max_len = 2048];
  optional string file_name = 6 [
    json_name = "fileName",
    (buf.validate.field).string.max_len = 255
  ];
  optional string file_type = 7 [
    json_name = "fileType",
    (buf.validate.field).string.max_len = 128
  ];
  optional int64 file_size = 8 [
    json_name = "fileSize",
    (buf.validate.field).int64.gte = 0
  ];
}

// --- Responses ---

message PunishmentResponse {
  string id = 1;
  string type = 2;
  int32 type_ordinal = 3;
  string issuer_name = 4;
  int64 issued = 5;
  optional int64 started = 6;
  bool is_appealable = 7;
  optional string reason = 8;
  optional string severity = 9;
  optional string status = 10;
  bool active = 11;
  optional int64 expires = 12;
  optional string player_uuid = 13;
  optional string player_username = 14;
  optional bool alt_blocking = 15;
  optional bool stat_wiping = 16;
  optional string effective_category = 17;
  repeated PunishmentModification modifications = 18;
  repeated PunishmentNote notes = 19;
  repeated PunishmentEvidence evidence = 20;
  repeated string attached_ticket_ids = 21;
}

message PunishmentCreateResponse {
  string message = 1;
  string punishment_id = 2;
  int32 status = 3;
}

message PunishmentAcknowledgeResponse {
  string message = 1;
  int32 status = 2;
}

message StatWipeAcknowledgeResponse {
  int32 status = 1;
  bool success = 2;
  string message = 3;
}

message PunishmentDetailResponse {
  PunishmentDetailEntry punishment = 1;
  int32 status = 2;

  message PunishmentDetailEntry {
    string id = 1;
    string player_uuid = 2;
    string player_name = 3;
    string issuer_name = 4;
    string issued = 5;
    string started = 6;
    string type = 7;
    google.protobuf.Struct data = 8;
    repeated google.protobuf.Struct modifications = 9;
    repeated google.protobuf.Struct notes = 10;
    repeated google.protobuf.Struct evidence = 11;
    int32 type_ordinal = 12;
    repeated string attached_ticket_ids = 13;
  }
}

message PunishmentPreviewResponse {
  string message = 1;
  string social_status = 2;
  string gameplay_status = 3;
  string offender_status = 4;
  string category = 5;
  SeverityPreview lenient = 6;
  SeverityPreview regular = 7;
  SeverityPreview aggravated = 8;
  SeverityPreview single_severity = 9;
  bool success = 10;
  bool single_severity_punishment = 11;
  bool permanent_until_username_change = 12;
  bool permanent_until_skin_change = 13;
  bool can_be_alt_blocking = 14;
  bool can_be_stat_wiping = 15;
  int32 status = 16;
  int32 social_points = 17;
  int32 gameplay_points = 18;

  message SeverityPreview {
    string severity = 1;
    string duration_formatted = 2;
    string punishment_type = 3;
    string new_social_status = 4;
    string new_gameplay_status = 5;
    bool permanent = 6;
    int32 points = 7;
    int32 new_social_points = 8;
    int32 new_gameplay_points = 9;
    int64 duration_ms = 10;
  }
}

message PunishmentSearchResult {
  string id = 1;
  string player_name = 2;
  int32 type_ordinal = 3;
  string status = 4;
  int64 issued = 5;
}

message PardonResponse {
  string message = 1;
  int32 status = 2;
  int32 pardoned_count = 3;
  bool success = 4;
}

message EvidenceUploadTokenResponse {
  string token = 1;
  int32 status = 2;
}

message ModifyPunishmentTicketsResponse {
  int32 status = 1;
  optional bool success = 2;
  string message = 3;
}

message PaginatedPunishmentsResponse {
  repeated PunishmentListEntry punishments = 1;
  int32 total_count = 2;
  int32 page = 3;
  bool has_more = 4;
  int32 status = 5;
}

message RecentPunishmentsResponse {
  repeated RecentPunishment punishments = 1;
  int32 status = 2;

  message RecentPunishment {
    string player_name = 1;
    string player_uuid = 2;
    string id = 3;
    string issuer_name = 4;
    int64 issued = 5;
    optional int64 started = 6;
    string type = 7;
    optional int32 type_ordinal = 8;
    repeated PunishmentModification modifications = 9;
    repeated PunishmentNote notes = 10;
    repeated PunishmentEvidence evidence = 11;
    repeated string attached_ticket_ids = 12;
    google.protobuf.Struct data = 13;
  }
}

message PunishmentListEntry {
  string id = 1;
  string issuer_name = 2;
  int64 issued = 3;
  optional int64 started = 4;
  string type = 5;
  optional int32 type_ordinal = 6;
  repeated PunishmentModification modifications = 7;
  repeated PunishmentNote notes = 8;
  repeated PunishmentEvidence evidence = 9;
  repeated string attached_ticket_ids = 10;
  google.protobuf.Struct data = 11;
}

message PunishmentTypesResponse {
  repeated PunishmentTypeData data = 1;
  int32 status = 2;

  message PunishmentTypeData {
    string name = 1;
    string category = 2;
    string staff_description = 3;
    string player_description = 4;
    google.protobuf.Struct durations = 5;
    google.protobuf.Struct points = 6;
    optional int32 custom_points = 7;
    optional bool can_be_alt_blocking = 8;
    optional bool can_be_stat_wiping = 9;
    optional bool single_severity_punishment = 10;
    optional bool permanent_until_skin_change = 11;
    optional bool permanent_until_username_change = 12;
    int32 id = 13;
    int32 ordinal = 14;
    bool is_customizable = 15;
  }
}
