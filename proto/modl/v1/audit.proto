syntax = "proto3";
package modl.v1;

import "google/protobuf/timestamp.proto";

message BulkPunishmentActionRequest {
  repeated string punishment_ids = 1;
  string action = 2;
  optional string reason = 3;
}

message DateRangeRollbackRequest {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
  optional string staff_id = 3;
}

message RollbackRequest {
  string audit_entry_id = 1;
  optional string reason = 2;
}

message PunishmentAuditResponse {
  string id = 1;
  string type = 2;
  string player_id = 3;
  string player_name = 4;
  string staff_id = 5;
  string staff_name = 6;
  optional string reason = 7;
  optional string duration = 8;
  google.protobuf.Timestamp timestamp = 9;
  bool can_rollback = 10;
}

message ActivePunishmentAuditResponse {
  string id = 1;
  string type = 2;
  string player_uuid = 3;
  string player_name = 4;
  bool active = 5;
}

message StaffDetailsResponse {
  string id = 1;
  string username = 2;
  string role = 3;
  int32 total_actions = 4;
  google.protobuf.Timestamp last_active = 5;
}

message StaffPerformanceResponse {
  string id = 1;
  string username = 2;
  string role = 3;
  int32 total_actions = 4;
  int32 ticket_responses = 5;
  int32 punishments_issued = 6;
  int32 avg_response_time = 7;
  google.protobuf.Timestamp last_active = 8;
}
