syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "modl/v1/player.proto";

// --- Sync Request (V2 backend record) ---

message SyncRequest {
  string last_sync_timestamp = 1 [json_name = "lastSyncTimestamp"];
  repeated SyncOnlinePlayer online_players = 2 [json_name = "onlinePlayers"];
  optional string server_name = 3 [json_name = "serverName"];
  repeated SyncChatLogEntry chat_logs = 4 [json_name = "chatLogs"];
  repeated SyncCommandLogEntry command_logs = 5 [json_name = "commandLogs"];
  optional SyncServerStatus server_status = 6 [json_name = "serverStatus"];
}

message SyncServerStatus {
  int32 online_player_count = 1 [json_name = "onlinePlayerCount"];
  int32 max_players = 2 [json_name = "maxPlayers"];
  string server_version = 3 [json_name = "serverVersion"];
  string timestamp = 4;
  string platform_type = 5 [json_name = "platformType"];
  string plugin_version = 6 [json_name = "pluginVersion"];
}

message SyncOnlinePlayer {
  string uuid = 1;
  string username = 2;
  string ip_address = 3 [json_name = "ipAddress"];
  int64 session_duration_ms = 4 [json_name = "sessionDurationMs"];
}

message SyncChatLogEntry {
  string uuid = 1;
  string username = 2;
  string message = 3;
  string server = 4;
  int64 timestamp = 5;
}

message SyncCommandLogEntry {
  string uuid = 1;
  string username = 2;
  string command = 3;
  string server = 4;
  int64 timestamp = 5;
}

// --- Sync Response ---

message SyncResponse {
  string timestamp = 1;
  SyncData data = 2;
}

message SyncData {
  repeated SyncPendingPunishment pending_punishments = 1;
  repeated SyncPendingPunishment recently_started_punishments = 2;
  repeated SyncModifiedPunishment recently_modified_punishments = 3;
  repeated SyncPlayerNotification player_notifications = 4;
  repeated SyncActiveStaffMember active_staff_members = 5;
  optional SyncMigrationTask migration_task = 6;
  repeated SyncStaffNotification staff_notifications = 7;
  repeated SyncPendingStatWipe pending_stat_wipes = 8;
  repeated SyncStaff2faVerification staff_2fa_verifications = 9;
  optional int64 staff_permissions_updated_at = 10;
  optional int64 punishment_types_updated_at = 11;
}

message SyncPendingPunishment {
  string minecraft_uuid = 1;
  string username = 2;
  SimplePunishment punishment = 3;
}

message SyncModifiedPunishment {
  string minecraft_uuid = 1;
  string username = 2;
  SyncPunishmentWithModifications punishment = 3;
}

message SyncPunishmentWithModifications {
  string id = 1;
  repeated SyncPunishmentModification modifications = 2;
}

message SyncPunishmentModification {
  string type = 1;
  optional int64 timestamp = 2;
  optional int64 effective_duration = 3;
}

message SyncPlayerNotification {
  string id = 1;
  string message = 2;
  string type = 3;
  optional string target_player_uuid = 4;
  optional google.protobuf.Struct data = 5;
  optional int64 timestamp = 6;
}

message SyncActiveStaffMember {
  string minecraft_uuid = 1;
  string minecraft_username = 2;
  string staff_username = 3;
  string staff_role = 4;
  string email = 5;
  string staff_id = 6;
  repeated string permissions = 7;
  optional bool two_factor_session_valid = 8;
}

message SyncStaffNotification {
  string id = 1;
  string type = 2;
  string message = 3;
  optional google.protobuf.Struct data = 4;
  optional int64 timestamp = 5;
}

message SyncMigrationTask {
  string task_id = 1;
  string type = 2;
}

message SyncPendingStatWipe {
  string minecraft_uuid = 1;
  string username = 2;
  string punishment_id = 3;
}

message SyncStaff2faVerification {
  string minecraft_uuid = 1;
}

// --- Startup ---

message StartupRequest {
  string server_version = 1;
  string platform_type = 2;
  string plugin_version = 3;
  int32 max_players = 4;
  optional string server_name = 5;
}

message StartupResponse {
  string panel_url = 1;
  string timestamp = 2;
}

// --- Acknowledgments ---

message AcknowledgeNotificationsRequest {
  string player_uuid = 1;
  string acknowledged_at = 2;
  repeated string notification_ids = 3;
}

message AcknowledgeStatWipeRequest {
  string punishment_id = 1;
  optional string server_name = 2;
  bool success = 3;
}

message ReportStaffDisconnectRequest {
  string minecraft_uuid = 1;
  int64 session_duration_ms = 2;
}
