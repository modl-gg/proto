syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";
import "modl/v1/ticket.proto";

// --- Requests ---

message CreateAppealRequest {
  string punishment_id = 1 [json_name = "punishmentId", (buf.validate.field).string.min_len = 1];
  string player_uuid = 2 [json_name = "playerUuid", (buf.validate.field).string = {
    min_len: 1,
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string email = 3 [(buf.validate.field).string.min_len = 1];
  optional string reason = 4;
  optional string evidence = 5;
  optional google.protobuf.Struct additional_data = 6 [json_name = "additionalData"];
  repeated google.protobuf.Value attachments = 7;
  map<string, string> field_labels = 8 [json_name = "fieldLabels"];
}

message AddAppealReplyRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  string content = 2 [(buf.validate.field).string.min_len = 1];
  string type = 3 [(buf.validate.field).string.min_len = 1];
  bool staff = 4;
  optional string action = 5;
  optional string avatar = 6;
  repeated google.protobuf.Value attachments = 7;
}

message UpdateAppealStatusRequest {
  string status = 1;
  optional bool locked = 2;
  optional string staff_username = 3 [json_name = "staffUsername"];
  optional string resolution = 4;
}

// --- Responses ---

message PublicAppealResponse {
  string id = 1;
  string type = 2;
  string subject = 3;
  string status = 4;
  string appeal_workflow_status = 5 [json_name = "appealWorkflowStatus"];
  string creator_name = 6 [json_name = "creatorName"];
  string creator_uuid = 7 [json_name = "creatorUuid"];
  google.protobuf.Timestamp created = 8;
  bool locked = 9;
  repeated TicketReply messages = 10;
  repeated TicketNote notes = 11;
  repeated string tags = 12;
  google.protobuf.Struct data = 13;
}

message CreatePublicAppealResponse {
  bool success = 1;
  string appeal_id = 2 [json_name = "appealId"];
  string message = 3;
  CreatePublicAppealInfo appeal = 4;

  message CreatePublicAppealInfo {
    string id = 1;
    string id_alias = 2 [json_name = "_id"];
    string type = 3;
    string subject = 4;
    string status = 5;
    string appeal_workflow_status = 6 [json_name = "appealWorkflowStatus"];
    string created = 7;
  }
}

message AddPublicAppealReplyResponse {
  bool success = 1;
  string message = 2;
  PublicTicketReply reply = 3;
}

// TicketReply, TicketNote, AIAnalysisResult, ChatMessage, TicketResponse
// are defined in ticket.proto and imported above.
