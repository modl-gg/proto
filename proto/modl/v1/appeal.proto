syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

message CreateAppealRequest {
  string punishment_id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 32}];
  string player_uuid = 2 [(buf.validate.field).string = {
    min_len: 1,
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string email = 3 [(buf.validate.field).string = {min_len: 1, max_len: 254}];
  optional string reason = 4 [(buf.validate.field).string.max_len = 4000];
  optional string evidence = 5 [(buf.validate.field).string.max_len = 4000];
  google.protobuf.Struct additional_data = 6;
  repeated google.protobuf.Struct attachments = 7 [(buf.validate.field).repeated.max_items = 20];
  map<string, string> field_labels = 8;
}

message AddAppealReplyRequest {
  string content = 1 [(buf.validate.field).string = {min_len: 1, max_len: 10000}];
  optional string type = 2;
  optional bool staff = 3;
}

message UpdateAppealStatusRequest {
  string status = 1 [(buf.validate.field).string.min_len = 1];
  optional string reason = 2;
}

message PublicAppealResponse {
  string id = 1;
  string punishment_id = 2;
  string status = 3;
  google.protobuf.Timestamp created_at = 4;
  optional google.protobuf.Timestamp updated_at = 5;
}
