syntax = "proto3";
package modl.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

message CreateHomepageCardRequest {
  string title = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string description = 2 [(buf.validate.field).string = {min_len: 1, max_len: 500}];
  optional string icon = 3 [(buf.validate.field).string.max_len = 128];
  optional string color = 4 [(buf.validate.field).string.max_len = 32];
  optional string action_type = 5 [(buf.validate.field).string.max_len = 64];
  optional string action_url = 6 [(buf.validate.field).string.max_len = 2048];
  optional string button_text = 7 [(buf.validate.field).string.max_len = 64];
  optional int32 order = 8;
}

message UpdateHomepageCardRequest {
  optional string title = 1 [(buf.validate.field).string.max_len = 128];
  optional string description = 2 [(buf.validate.field).string.max_len = 500];
  optional string icon = 3 [(buf.validate.field).string.max_len = 128];
  optional string color = 4 [(buf.validate.field).string.max_len = 32];
  optional string action_type = 5 [(buf.validate.field).string.max_len = 64];
  optional string action_url = 6 [(buf.validate.field).string.max_len = 2048];
  optional string button_text = 7 [(buf.validate.field).string.max_len = 64];
  optional int32 order = 8;
}

message HomepageCardResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  optional string icon = 4;
  optional string color = 5;
  optional string action_type = 6;
  optional string action_url = 7;
  optional string button_text = 8;
  int32 order = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}
