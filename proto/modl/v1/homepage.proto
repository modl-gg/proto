syntax = "proto3";
package modl.v1;

import "google/protobuf/timestamp.proto";

message CreateCardRequest {
  string title = 1;
  optional string description = 2;
  optional string icon = 3;
  optional string icon_color = 4;
  optional string action_type = 5;
  optional string action_url = 6;
  optional string action_button_text = 7;
  optional string category_id = 8;
  optional string background_color = 9;
  optional bool is_enabled = 10;
}

message UpdateCardRequest {
  optional string title = 1;
  optional string description = 2;
  optional string icon = 3;
  optional string icon_color = 4;
  optional string action_type = 5;
  optional string action_url = 6;
  optional string action_button_text = 7;
  optional string category_id = 8;
  optional string background_color = 9;
  optional bool is_enabled = 10;
}

message HomepageCardResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string icon = 4;
  string icon_color = 5;
  string action_type = 6;
  string action_url = 7;
  string action_button_text = 8;
  string category_id = 9;
  string background_color = 10;
  int32 ordinal = 11;
  bool is_enabled = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  EmbeddedCategory category = 15;

  message EmbeddedCategory {
    string id = 1;
    string name = 2;
    string slug = 3;
    string description = 4;
    repeated ArticleStub articles = 5;
  }

  message ArticleStub {
    string id = 1;
    string title = 2;
    string slug = 3;
    int32 ordinal = 4;
  }
}
