syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "buf/validate/validate.proto";

// --- Shared data types ---

message TicketReply {
  string id = 1;
  string name = 2;
  string avatar = 3;
  string content = 4;
  string type = 5;
  int64 created = 6;
  bool staff = 7;
  string action = 8;
  repeated google.protobuf.Struct attachments = 9;
  string creator_identifier = 10;
}

message TicketNote {
  string text = 1;
  string issuer_name = 2;
  string issuer_avatar = 3;
  int64 date = 4;
}

message TicketChatMessage {
  string content = 1;
  int64 timestamp = 2;
}

message AIAnalysisResult {
  string analysis = 1;
  optional SuggestedAction suggested_action = 2;
  int64 created_at = 3;
  string raw_response = 4;
  bool was_applied_automatically = 5;
  bool dismissed = 6;

  message SuggestedAction {
    int32 punishment_type_id = 1;
    string severity = 2;
  }
}

// --- Requests ---

message CreateTicketRequest {
  string type = 1 [(buf.validate.field).string.min_len = 1];
  optional string subject = 2 [(buf.validate.field).string.max_len = 256];
  optional string description = 3 [(buf.validate.field).string.max_len = 10000];
  optional string creator_uuid = 4 [(buf.validate.field).string.pattern = "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"];
  optional string creator_name = 5 [(buf.validate.field).string.max_len = 16];
  optional string creator_email = 6 [(buf.validate.field).string.max_len = 254];
  optional string reported_player_uuid = 7;
  optional string reported_player_name = 8 [(buf.validate.field).string.max_len = 16];
  repeated google.protobuf.Struct chat_messages = 9 [(buf.validate.field).repeated.max_items = 100];
  optional google.protobuf.Struct form_data = 10;
  repeated google.protobuf.Struct attachments = 11 [(buf.validate.field).repeated.max_items = 20];
  repeated string tags = 12 [(buf.validate.field).repeated.max_items = 20];
  optional string priority = 13;
  optional string creator_identifier = 14 [(buf.validate.field).string.max_len = 256];
  optional bool email_auth_enabled = 15;
  map<string, string> field_labels = 16;
}

message MinecraftCreateTicketRequest {
  string creator_uuid = 1;
  optional string creator_name = 2;
  string type = 3;
  optional string subject = 4;
  optional string description = 5;
  optional string reported_player_uuid = 6;
  optional string reported_player_name = 7;
  repeated string chat_messages = 8;
  repeated string tags = 9;
  optional string priority = 10;
  optional string created_server = 11;
  optional string replay_url = 12;
}

message SubmitTicketFormRequest {
  string subject = 1;
  optional string creator_email = 2;
  optional google.protobuf.Struct form_data = 3;
  repeated google.protobuf.Struct attachments = 4;
  optional string creator_identifier = 5;
  map<string, string> field_labels = 6;
}

message UpdateTicketRequest {
  optional string status = 1 [(buf.validate.field).string.max_len = 32];
  optional bool locked = 2;
  optional AddReplyRequest new_reply = 3;
  optional AddNoteRequest new_note = 4;
  repeated string tags = 5 [(buf.validate.field).repeated.max_items = 20];
  optional google.protobuf.Struct data = 6;
  optional bool hidden = 7;
  repeated string assigned_to = 8;
}

message AddReplyRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  string content = 2 [(buf.validate.field).string = {min_len: 1, max_len: 10000}];
  optional string type = 3 [(buf.validate.field).string.max_len = 32];
  bool staff = 4;
  optional string avatar = 5 [(buf.validate.field).string.max_len = 2048];
  repeated google.protobuf.Struct attachments = 6 [(buf.validate.field).repeated.max_items = 20];
  optional string action = 7 [(buf.validate.field).string.max_len = 64];
  optional string creator_identifier = 8 [(buf.validate.field).string.max_len = 256];
}

message AddNoteRequest {
  string text = 1 [(buf.validate.field).string = {min_len: 1, max_len: 4000}];
  string issuer_name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  optional string issuer_avatar = 3 [(buf.validate.field).string.max_len = 2048];
}

message AddTagRequest {
  string tag = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  optional string staff_name = 2;
}

message AssignReportRequest {
  string assignee = 1;
}

message BulkTicketUpdateRequest {
  repeated string ticket_ids = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 100}];
  optional bool locked = 2;
  repeated string add_labels = 3 [(buf.validate.field).repeated.max_items = 50];
  repeated string remove_labels = 4 [(buf.validate.field).repeated.max_items = 50];
  optional string assign_to = 5 [(buf.validate.field).string.max_len = 256];
  optional bool hidden = 6;
}

message QuickResponseRequest {
  string action_id = 1;
  string category_id = 2;
  optional int32 punishment_type_id = 3;
  optional string punishment_severity = 4;
  optional google.protobuf.Struct custom_values = 5;
  optional string appeal_action = 6;
}

message DismissReportRequest {
  string dismissed_by = 1;
  optional string reason = 2;
}

message ResolveReportRequest {
  string resolved_by = 1;
  string resolution = 2;
  string punishment_id = 3;
}

message MinecraftClaimTicketRequest {
  string player_uuid = 1;
  string player_name = 2;
}

message MinecraftTicketsByIdsRequest {
  repeated string ids = 1;
}

message VerifyTicketCodeRequest {
  string code = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

// --- Responses ---

message TicketResponse {
  string id = 1;
  string type = 2;
  string category = 3;
  string subject = 4;
  string status = 5;
  string appeal_workflow_status = 6;
  string creator_name = 7;
  string creator_uuid = 8;
  string reported_by = 9;
  string reported_player = 10;
  string reported_player_uuid = 11;
  int64 date = 12;
  bool locked = 13;
  repeated TicketReply messages = 14;
  repeated TicketNote notes = 15;
  repeated string tags = 16;
  google.protobuf.Struct form_data = 17;
  google.protobuf.Struct data = 18;
  repeated TicketChatMessage chat_messages = 19;
  AIAnalysisResult ai_analysis = 20;
  bool email_auth_enabled = 21;
  bool hidden = 22;
  string replay_url = 23;
  repeated string assigned_to = 24;
}

message TicketListItemResponse {
  string id = 1;
  string subject = 2;
  string status = 3;
  string reported_by = 4;
  string reported_by_name = 5;
  int64 date = 6;
  string category = 7;
  bool locked = 8;
  string type = 9;
  TicketReply last_reply = 10;
  int32 reply_count = 11;
  repeated string tags = 12;
  repeated string assigned_to = 13;
  bool hidden = 14;
}

message PaginatedTicketsResponse {
  repeated TicketListItemResponse tickets = 1;
  PaginatedTicketsPaginationInfo pagination = 2;
  PaginatedTicketsFiltersInfo filters = 3;

  message PaginatedTicketsPaginationInfo {
    int32 current = 1;
    int32 total = 2;
    int32 limit = 3;
    int64 total_tickets = 4;
    bool has_next = 5;
    bool has_prev = 6;
  }

  message PaginatedTicketsFiltersInfo {
    string search = 1;
    string status = 2;
    repeated string types = 3;
  }
}

message QuickResponseResult {
  bool success = 1;
  string message = 2;
  string ticket_id = 3;
  string action_name = 4;
  bool ticket_closed = 5;
  bool punishment_issued = 6;
  string appeal_outcome = 7;
}

message TicketsResponse {
  int32 status = 1;
  repeated MinecraftTicketListItem tickets = 2;
}

message MinecraftTicketListItem {
  string id = 1;
  string type = 2;
  string category = 3;
  string subject = 4;
  string status = 5;
  string player_name = 6 [json_name = "playerName"];
  string player_uuid = 7 [json_name = "playerUuid"];
  string priority = 8;
  optional string first_reply_content = 9 [json_name = "firstReplyContent"];
  repeated string assigned_to = 10 [json_name = "assignedTo"];
  int64 created_at = 11 [json_name = "createdAt"];
  optional int64 updated_at = 12 [json_name = "updatedAt"];
  bool has_staff_response = 13 [json_name = "hasStaffResponse"];
  bool locked = 14;
  int32 reply_count = 15 [json_name = "replyCount"];
}

message ReportsResponse {
  int32 status = 1;
  repeated ReportEntry reports = 2;
}

message ReportEntry {
  string id = 1;
  string type = 2;
  string category = 3;
  string reporter_name = 4 [json_name = "reporterName"];
  string reporter_uuid = 5 [json_name = "reporterUuid"];
  string reported_player_uuid = 6 [json_name = "reportedPlayerUuid"];
  string reported_player_name = 7 [json_name = "reportedPlayerName"];
  string subject = 8;
  string content = 9;
  string status = 10;
  string priority = 11;
  int64 created_at = 12 [json_name = "createdAt"];
  repeated string assigned_to = 13 [json_name = "assignedTo"];
  repeated google.protobuf.Struct chat_messages = 14 [json_name = "chatMessages"];
}

message CreateTicketResponse {
  optional string ticket_id = 1;
  optional string message = 2;
  optional CreateTicketInfo ticket = 3;
  bool success = 4;

  message CreateTicketInfo {
    string id = 1;
    string type = 2;
    optional string subject = 3;
    optional string status = 4;
    optional string created = 5;
  }
}

message ClaimTicketResponse {
  string message = 1;
  string ticket_id = 2;
  string subject = 3;
  int32 status = 4;
  bool success = 5;
}

message SubscriptionUpdateResponse {
  string id = 1;
  string ticket_id = 2;
  string ticket_title = 3;
  string reply_content = 4;
  string reply_by = 5;
  int64 reply_at = 6;
  bool is_staff_reply = 7;
  bool is_read = 8;
  optional int32 additional_count = 9;
}

message TicketSubscriptionResponse {
  string ticket_id = 1;
  string ticket_title = 2;
  int64 subscribed_at = 3;
}
