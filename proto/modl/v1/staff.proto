syntax = "proto3";
package modl.v1;

import "buf/validate/validate.proto";

// --- Staff Requests ---

message CreateStaffRequest {
  string email = 1 [(buf.validate.field).string = {min_len: 1, max_len: 254}];
  string username = 2 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  optional string role = 3 [(buf.validate.field).string.max_len = 64];
}

message UpdateStaffRequest {
  optional string email = 1 [(buf.validate.field).string.max_len = 254];
  optional string role = 2 [(buf.validate.field).string.max_len = 64];
}

message UpdateStaffRoleRequest {
  string role = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

message InviteStaffRequest {
  optional string email = 1 [(buf.validate.field).string.max_len = 254];
  repeated string emails = 2;
  string role = 3 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

message AcceptInvitationRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message AssignMinecraftPlayerRequest {
  optional string minecraft_uuid = 1 [(buf.validate.field).string.pattern = "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"];
  optional string minecraft_username = 2;
}

message GenerateStaff2faTokenRequest {
  string minecraft_uuid = 1;
  string ip = 2;
}

message StaffDisconnectRequest {
  string minecraft_uuid = 1;
  int64 session_duration_ms = 2;
}

// --- Role Requests ---

message RoleRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  string description = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  repeated string permissions = 3 [(buf.validate.field).repeated.max_items = 200];
}

message ReorderRolesRequest {
  repeated RoleOrderItem role_order = 1;

  message RoleOrderItem {
    string id = 1;
    int32 order = 2;
  }
}

// --- Staff Responses ---

message StaffResponse {
  string id = 1;
  string email = 2;
  string username = 3;
  string role = 4;
  string status = 5;
  string assigned_minecraft_uuid = 6;
  string assigned_minecraft_username = 7;
  int64 created_at = 8;
}

message MinecraftStaffSummaryResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string minecraft_uuid = 5;
  string minecraft_username = 6;
  repeated string permissions = 7;
  int64 last_seen = 8;
  int64 total_playtime_ms = 9;
  string last_server = 10;
  int32 punishments_issued_count = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
}

message MinecraftStaffPermissionsResponse {
  string minecraft_uuid = 1;
  string minecraft_username = 2;
  string staff_username = 3;
  string staff_id = 4;
  string staff_role = 5;
  repeated string permissions = 6;
  string email = 7;
}

message AvailablePlayerResponse {
  string uuid = 1;
  string username = 2;
}

message InviteResultResponse {
  string message = 1;
  repeated string success = 2;
  repeated FailedInvite failed = 3;

  message FailedInvite {
    string email = 1;
    string reason = 2;
  }
}

message Staff2faTokenResponse {
  string token = 1;
  string verify_url = 2;
}

message StaffListResponse {
  int32 status = 1;
  repeated MinecraftStaffSummaryResponse staff = 2;
}

message StaffPermissionsListResponse {
  int32 status = 1;
  StaffPermissionsData data = 2;

  message StaffPermissionsData {
    repeated MinecraftStaffPermissionsResponse staff = 1;
  }
}

// --- Role Responses ---

message RoleResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
  bool is_default = 5;
  int32 order = 6;
  int32 user_count = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message RoleListResponse {
  int32 status = 1;
  repeated RoleResponse roles = 2;
}

message PermissionsResponse {
  repeated Permission permissions = 1;
  map<string, string> categories = 2;

  message Permission {
    string id = 1;
    string name = 2;
    string description = 3;
    string category = 4;
    optional string parent_id = 5;
  }
}
