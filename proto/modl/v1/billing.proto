syntax = "proto3";
package modl.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message UsageBillingSettingsRequest {
  bool enabled = 1;
}

message UpdateOverageLimitsRequest {
  // Legacy implicit-presence field; v3 callers should use max_storage_overage_gb_value.
  int32 max_storage_overage_gb = 1 [
    json_name = "maxStorageOverageGB",
    (buf.validate.field).int32 = {
      gte: 0
      lte: 2000
    }
  ];
  // Legacy implicit-presence field; v3 callers should use max_ai_overage_requests_value.
  int32 max_ai_overage_requests = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 5000
  }];
  // Explicit-presence value for v3 callers; transport/controller code should prefer this when present.
  optional int32 max_storage_overage_gb_value = 3 [
    json_name = "maxStorageOverageGBValue",
    (buf.validate.field).int32 = {
      gte: 0
      lte: 2000
    }
  ];
  // Explicit-presence value for v3 callers; transport/controller code should prefer this when present.
  optional int32 max_ai_overage_requests_value = 4 [
    json_name = "maxAiOverageRequestsValue",
    (buf.validate.field).int32 = {
      gte: 0
      lte: 5000
    }
  ];
}

message UpdateStorageLimitRequest {
  int64 max_storage_limit_bytes = 1 [(buf.validate.field).int64.gt = 0];
}

message PortalSessionResponse {
  string url = 1;
}

message CheckoutSessionResponse {
  string session_id = 1;
  string url = 2;
}

message UpdateStorageLimitResponse {
  bool success = 1;
  int64 max_storage_limit_bytes = 2;
}

message UpdateOverageLimitsResponse {
  bool success = 1;
  int64 max_storage_limit_bytes = 2;
  int32 max_ai_overage_requests = 3;
}

message UsageResponse {
  Period period = 1;
  UsageMetric cdn = 2;
  UsageMetric ai = 3;
  double total_overage_cost = 4;
  bool usage_billing_enabled = 5;

  message Period {
    google.protobuf.Timestamp start = 1;
    google.protobuf.Timestamp end = 2;
  }

  message UsageMetric {
    double used = 1;
    double limit = 2;
    double overage = 3;
    double overage_rate = 4;
    double overage_cost = 5;
    double percentage = 6;
  }
}

message BillingStatusResponse {
  // Legacy implicit-presence field; use plan_value when null/empty must be preserved.
  string plan = 1;
  // Legacy implicit-presence field; use subscription_status_value when null/empty must be preserved.
  string subscription_status = 2;
  google.protobuf.Timestamp current_period_start = 3;
  google.protobuf.Timestamp current_period_end = 4;
  optional bool custom_domain_grandfathered = 5;
  optional int64 max_storage_limit_bytes = 6;
  optional int64 max_ai_overage_requests = 7;
  optional string plan_value = 8;
  optional string subscription_status_value = 9;
}

message UsageBillingSettingsResponse {
  bool success = 1;
  string message = 2;
  bool usage_billing_enabled = 3;
}

message ResubscribeResponse {
  bool success = 1;
  string message = 2;
  SubscriptionInfo subscription = 3;

  message SubscriptionInfo {
    string id = 1;
    string status = 2;
    google.protobuf.Timestamp current_period_end = 3;
  }
}

message CancelResponse {
  bool success = 1;
  string message = 2;
  google.protobuf.Timestamp cancels_at = 3;
}
