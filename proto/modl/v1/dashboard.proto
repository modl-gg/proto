syntax = "proto3";
package modl.v1;

message DashboardMetricsResponse {
  int64 total_tickets = 1 [json_name = "totalTickets"];
  int64 open_tickets = 2 [json_name = "openTickets"];
  int64 total_players = 3 [json_name = "totalPlayers"];
  int64 total_punishments = 4 [json_name = "totalPunishments"];
  int64 active_punishments = 5 [json_name = "activePunishments"];
  int64 total_staff = 6 [json_name = "totalStaff"];
  int32 tickets_trend = 7 [json_name = "ticketsTrend"];
  int32 players_trend = 8 [json_name = "playersTrend"];
}

message ActivityItemResponse {
  string id = 1;
  string type = 2;
  string color = 3;
  string title = 4;
  int64 time = 5;
  string description = 6;
  repeated ActivityAction actions = 7;
}

message ActivityAction {
  string label = 1;
  string link = 2;
  bool primary = 3;
}

message MinecraftDashboardResponse {
  int32 status = 1;
  MinecraftDashboardStatsResponse stats = 2;
}

message MinecraftDashboardStatsResponse {
  int64 unresolved_reports = 1 [json_name = "unresolvedReports"];
  int64 unresolved_tickets = 2 [json_name = "unresolvedTickets"];
  int64 online_staff = 3 [json_name = "onlineStaff"];
  int64 online_players = 4 [json_name = "onlinePlayers"];
  int64 active_bans = 5 [json_name = "activeBans"];
  int64 active_mutes = 6 [json_name = "activeMutes"];
  int64 total_active_punishments = 7 [json_name = "totalActivePunishments"];
  int64 total_players = 8 [json_name = "totalPlayers"];
}

message RecentPunishmentResponse {
  string id = 1;
  string player_name = 2 [json_name = "playerName"];
  string player_uuid = 3 [json_name = "playerUuid"];
  string type = 4;
  string reason = 5;
  string issuer_name = 6 [json_name = "issuerName"];
  int64 issued = 7;
  bool active = 8;
}

message RecentTicketResponse {
  string id = 1;
  string title = 2;
  string initial_message = 3 [json_name = "initialMessage"];
  string status = 4;
  string priority = 5;
  int64 created_at = 6 [json_name = "createdAt"];
  string player_name = 7 [json_name = "playerName"];
  string type = 8;
}
