syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// --- Requests ---

message ApplyAIPunishmentRequest {
  optional string staff_name = 1 [json_name = "staffName"];
}

message ConfigureDomainRequest {
  string custom_domain = 1 [json_name = "customDomain", (buf.validate.field).string.min_len = 1];
}

message PatchGeneralSettingsRequest {
  int64 expected_version = 1 [json_name = "expectedVersion", (buf.validate.field).int64.gte = 0];
  optional string server_display_name = 2 [json_name = "serverDisplayName"];
  optional string discord_webhook_url = 3 [json_name = "discordWebhookUrl"];
  optional string homepage_icon_url = 4 [json_name = "homepageIconUrl"];
  optional string panel_icon_url = 5 [json_name = "panelIconUrl"];
}

message PatchQuickResponsesRequest {
  int64 expected_version = 1 [json_name = "expectedVersion", (buf.validate.field).int64.gte = 0];
  repeated QuickResponseCategory categories = 2;
}

message PatchStatusThresholdSettingsRequest {
  int64 expected_version = 1 [json_name = "expectedVersion", (buf.validate.field).int64.gte = 0];
  OffenderThresholdSettings settings = 2;
}

message PatchTicketFormSettingsRequest {
  int64 expected_version = 1 [json_name = "expectedVersion", (buf.validate.field).int64.gte = 0];
  TicketFormSettings settings = 2;
}

message PatchTicketLabelSettingsRequest {
  int64 expected_version = 1 [json_name = "expectedVersion", (buf.validate.field).int64.gte = 0];
  repeated Label labels = 2;
}

message PunishmentTypeRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  string category = 2 [(buf.validate.field).string.min_len = 1];
  PunishmentDurations durations = 3;
  OffenseLevelDurations single_severity_durations = 4 [json_name = "singleSeverityDurations"];
  optional int32 single_severity_points = 5 [json_name = "singleSeverityPoints"];
  PunishmentPoints points = 6;
  optional int32 custom_points = 7 [json_name = "customPoints"];
  string staff_description = 8 [json_name = "staffDescription"];
  string player_description = 9 [json_name = "playerDescription"];
  optional bool single_severity_punishment = 10 [json_name = "singleSeverityPunishment"];
  optional bool can_be_alt_blocking = 11 [json_name = "canBeAltBlocking"];
  optional bool can_be_stat_wiping = 12 [json_name = "canBeStatWiping"];
  optional bool appealable = 13;
  AppealForm appeal_form = 14 [json_name = "appealForm"];
  optional bool permanent_until_skin_change = 15 [json_name = "permanentUntilSkinChange"];
  optional bool permanent_until_username_change = 16 [json_name = "permanentUntilUsernameChange"];
}

message UpdateAIModerationSettingsRequest {
  optional bool enable_ai_review = 1 [json_name = "enableAIReview"];
  optional bool enable_automated_actions = 2 [json_name = "enableAutomatedActions"];
  map<string, AIPunishmentConfigRequest> ai_punishment_configs = 3 [json_name = "aiPunishmentConfigs"];
}

message AIPunishmentConfigRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  string ai_description = 3 [json_name = "aiDescription", (buf.validate.field).string.min_len = 1];
  optional bool enabled = 4;
}

message UpdateQuickResponsesRequest {
  repeated QuickResponseCategory categories = 1;
}

message UpdateWebhookSettingsRequest {
  string discord_webhook_url = 1 [json_name = "discordWebhookUrl"];
  string discord_admin_role_id = 2 [json_name = "discordAdminRoleId"];
  string bot_name = 3 [json_name = "botName"];
  string avatar_url = 4 [json_name = "avatarUrl"];
  optional bool enabled = 5;
  WebhookNotificationSettingsRequest notifications = 6;
  WebhookEmbedTemplatesRequest embed_templates = 7 [json_name = "embedTemplates"];
}

message WebhookNotificationSettingsRequest {
  optional bool new_tickets = 1 [json_name = "newTickets"];
  optional bool new_punishments = 2 [json_name = "newPunishments"];
  optional bool audit_logs = 3 [json_name = "auditLogs"];
}

message WebhookEmbedTemplatesRequest {
  WebhookEmbedTemplateRequest new_tickets = 1 [json_name = "newTickets"];
  WebhookEmbedTemplateRequest new_punishments = 2 [json_name = "newPunishments"];
  WebhookEmbedTemplateRequest audit_logs = 3 [json_name = "auditLogs"];
}

message WebhookEmbedTemplateRequest {
  string title = 1;
  string description = 2;
  string color = 3;
  repeated WebhookEmbedFieldRequest fields = 4;
}

message WebhookEmbedFieldRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  string value = 2 [(buf.validate.field).string.min_len = 1];
  optional bool inline = 3;
}

message VerifyDomainRequest {
  string domain = 1 [(buf.validate.field).string.min_len = 1];
}

// --- Responses ---

message PublicSettingsResponse {
  bool server_exists = 1 [json_name = "serverExists"];
  string server_display_name = 2 [json_name = "serverDisplayName"];
  string panel_icon_url = 3 [json_name = "panelIconUrl"];
  string homepage_icon_url = 4 [json_name = "homepageIconUrl"];
  google.protobuf.Struct ticket_forms = 5 [json_name = "ticketForms"];
  bool maintenance_mode = 6 [json_name = "maintenanceMode"];
  string maintenance_message = 7 [json_name = "maintenanceMessage"];
}

// --- Settings Data Types ---

message GeneralSettings {
  string server_display_name = 1 [json_name = "serverDisplayName"];
  string discord_webhook_url = 2 [json_name = "discordWebhookUrl"];
  string homepage_icon_url = 3 [json_name = "homepageIconUrl"];
  string panel_icon_url = 4 [json_name = "panelIconUrl"];
}

message OffenderThresholdSettings {
  CategoryThresholds social = 1;
  CategoryThresholds gameplay = 2;
}

message CategoryThresholds {
  int32 medium = 1;
  int32 habitual = 2;
  int32 point_expiry_months = 3 [json_name = "pointExpiryMonths"];
}

message TicketFormSettings {
  TicketForm bug = 1;
  TicketForm support = 2;
  TicketForm application = 3;
  TicketForm player = 4;
  TicketForm chat = 5;
}

message TicketForm {
  bool require_email = 1 [json_name = "requireEmail"];
  bool require_email_auth = 2 [json_name = "requireEmailAuth"];
  bool allow_email_notifications = 3 [json_name = "allowEmailNotifications"];
  repeated FormField fields = 4;
  repeated FormSection sections = 5;
}

message FormField {
  string id = 1;
  string type = 2;
  string label = 3;
  string description = 4;
  bool required = 5;
  repeated string options = 6;
  int32 order = 7;
  string section_id = 8 [json_name = "sectionId"];
  string go_to_section = 9 [json_name = "goToSection"];
  map<string, string> option_section_mapping = 10 [json_name = "optionSectionMapping"];
}

message FormSection {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 order = 4;
  string show_if_field_id = 5 [json_name = "showIfFieldId"];
  string show_if_value = 6 [json_name = "showIfValue"];
  repeated string show_if_values = 7 [json_name = "showIfValues"];
  bool hide_by_default = 8 [json_name = "hideByDefault"];
}

message TicketLabelSettings {
  repeated Label labels = 1;
}

message Label {
  string id = 1;
  string name = 2;
  string color = 3;
  string description = 4;
}

message QuickResponseSettings {
  repeated QuickResponseCategory categories = 1;
}

message QuickResponseCategory {
  string id = 1;
  string name = 2;
  repeated string ticket_types = 3 [json_name = "ticketTypes"];
  repeated QuickResponseAction actions = 4;
  optional int32 order = 5;
}

message QuickResponseAction {
  string id = 1;
  string name = 2;
  string message = 3;
  optional int32 order = 4;
  optional bool close_ticket = 5 [json_name = "closeTicket"];
  optional bool show_punishment = 6 [json_name = "showPunishment"];
  string appeal_action = 7 [json_name = "appealAction"];
}

message AIModerationSettings {
  bool enable_ai_review = 1 [json_name = "enableAIReview"];
  bool enable_automated_actions = 2 [json_name = "enableAutomatedActions"];
  map<string, AIPunishmentConfig> ai_punishment_configs = 3 [json_name = "aiPunishmentConfigs"];
}

message AIPunishmentConfig {
  string id = 1;
  string name = 2;
  string ai_description = 3 [json_name = "aiDescription"];
  bool enabled = 4;
}

message WebhookSettings {
  string discord_webhook_url = 1 [json_name = "discordWebhookUrl"];
  string discord_admin_role_id = 2 [json_name = "discordAdminRoleId"];
  string bot_name = 3 [json_name = "botName"];
  string avatar_url = 4 [json_name = "avatarUrl"];
  bool enabled = 5;
  WebhookNotificationSettings notifications = 6;
  WebhookEmbedTemplates embed_templates = 7 [json_name = "embedTemplates"];
}

message WebhookNotificationSettings {
  bool new_tickets = 1 [json_name = "newTickets"];
  bool new_punishments = 2 [json_name = "newPunishments"];
  bool audit_logs = 3 [json_name = "auditLogs"];
}

message WebhookEmbedTemplates {
  WebhookEmbedTemplate new_tickets = 1 [json_name = "newTickets"];
  WebhookEmbedTemplate new_punishments = 2 [json_name = "newPunishments"];
  WebhookEmbedTemplate audit_logs = 3 [json_name = "auditLogs"];
}

message WebhookEmbedTemplate {
  string title = 1;
  string description = 2;
  string color = 3;
  repeated WebhookEmbedField fields = 4;
}

message WebhookEmbedField {
  string name = 1;
  string value = 2;
  bool inline = 3;
}

message PunishmentType {
  optional int32 id = 1;
  string name = 2;
  string category = 3;
  optional bool customizable = 4;
  optional int32 ordinal = 5;
  PunishmentDurations durations = 6;
  optional bool single_severity_punishment = 7 [json_name = "singleSeverityPunishment"];
  OffenseLevelDurations single_severity_durations = 8 [json_name = "singleSeverityDurations"];
  optional int32 single_severity_points = 9 [json_name = "singleSeverityPoints"];
  PunishmentPoints points = 10;
  optional int32 custom_points = 11 [json_name = "customPoints"];
  string staff_description = 12 [json_name = "staffDescription"];
  string player_description = 13 [json_name = "playerDescription"];
  optional bool can_be_alt_blocking = 14 [json_name = "canBeAltBlocking"];
  optional bool can_be_stat_wiping = 15 [json_name = "canBeStatWiping"];
  optional bool appealable = 16;
  AppealForm appeal_form = 17 [json_name = "appealForm"];
  optional bool permanent_until_skin_change = 18 [json_name = "permanentUntilSkinChange"];
  optional bool permanent_until_username_change = 19 [json_name = "permanentUntilUsernameChange"];
}

message PunishmentDurations {
  OffenseLevelDurations low = 1;
  OffenseLevelDurations regular = 2;
  OffenseLevelDurations severe = 3;
}

message OffenseLevelDurations {
  DurationDetail first = 1;
  DurationDetail medium = 2;
  DurationDetail habitual = 3;
}

message DurationDetail {
  int32 value = 1;
  string unit = 2;
  string type = 3;
}

message PunishmentPoints {
  int32 low = 1;
  int32 regular = 2;
  int32 severe = 3;
}

message AppealForm {
  repeated AppealFormField fields = 1;
  repeated AppealFormSection sections = 2;
}

message AppealFormField {
  string id = 1;
  string type = 2;
  string label = 3;
  string description = 4;
  optional bool required = 5;
  optional int32 order = 6;
  string section_id = 7 [json_name = "sectionId"];
}

message AppealFormSection {
  string id = 1;
  string title = 2;
  string description = 3;
  optional int32 order = 4;
}

message SettingsMeta {
  int64 version = 1;
  google.protobuf.Timestamp updated_at = 2 [json_name = "updatedAt"];
}

message SettingsEnvelope {
  google.protobuf.Struct data = 1;
  SettingsMeta _meta = 2;
}
