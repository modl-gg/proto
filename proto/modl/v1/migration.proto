syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message StartMigrationRequest {
  string migration_type = 1;
}

message UpdateProgressRequest {
  string status = 1;
  string message = 2;
  optional int32 records_processed = 3;
  optional int32 records_skipped = 4;
  optional int32 total_records = 5;
}

message MigrationStatusUpdateRequest {
  string task_id = 1;
  string status = 2;
  string message = 3;
  optional int32 records_processed = 4;
  optional int32 total_records = 5;
}

message MigrationStatusResponse {
  CurrentMigration current_migration = 1;
  CooldownInfo cooldown = 2;

  message CurrentMigration {
    string task_id = 1;
    string type = 2;
    string status = 3;
    MigrationProgress progress = 4;
    google.protobuf.Timestamp started_at = 5;
    google.protobuf.Timestamp completed_at = 6;
    string error = 7;
  }

  message MigrationProgress {
    string message = 1;
    optional int32 records_processed = 2;
    optional int32 records_skipped = 3;
    optional int32 total_records = 4;
  }

  message CooldownInfo {
    bool on_cooldown = 1;
    optional int64 remaining_time = 2;
  }
}

message MigrationOperationResponse {
  bool success = 1;
  optional string task_id = 2 [json_name = "taskId"];
  optional string message = 3;
  optional string error = 4;
}

message MigrationPlayerData {
  string minecraft_uuid = 1;
  repeated UsernameData usernames = 2;
  repeated NoteData notes = 3;
  repeated IPData ip_addresses = 4;
  repeated PunishmentData punishments = 5;
  google.protobuf.Struct data = 6;

  message UsernameData {
    string username = 1;
    string date = 2;
  }

  message NoteData {
    string text = 1;
    string date = 2;
    string issuer_name = 3;
  }

  message IPData {
    string ip_address = 1;
    optional string country = 2;
    optional string region = 3;
    optional string asn = 4;
    optional bool proxy = 5;
    optional bool hosting = 6;
    optional string first_login = 7;
    repeated string logins = 8;
  }

  message PunishmentData {
    string id = 1;
    string type = 2;
    int32 type_ordinal = 3;
    string reason = 4;
    string issued = 5;
    string issuer_name = 6;
    optional int64 duration = 7;
    string started = 8;
    repeated PunishmentNoteData notes = 9;
    repeated google.protobuf.Struct evidence = 10;
    repeated string attached_ticket_ids = 11;
    repeated google.protobuf.Struct modifications = 12;
    google.protobuf.Struct data = 13;
  }

  message PunishmentNoteData {
    string text = 1;
    string issuer_name = 2;
    string date = 3;
  }
}
