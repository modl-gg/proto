syntax = "proto3";
package modl.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// --- Requests ---

message PresignUploadRequest {
  string upload_type = 1 [json_name = "uploadType", (buf.validate.field).string.min_len = 1];
  string file_name = 2 [json_name = "fileName", (buf.validate.field).string.min_len = 1];
  int64 file_size = 3 [json_name = "fileSize", (buf.validate.field).int64.gt = 0];
  string content_type = 4 [json_name = "contentType", (buf.validate.field).string.min_len = 1];
  optional string entity_id = 5 [json_name = "entityId"];
  optional string access_token = 6 [json_name = "accessToken"];
}

message ConfirmUploadRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
  optional string access_token = 2 [json_name = "accessToken"];
}

message EvidencePresignUploadRequest {
  string file_name = 1 [json_name = "fileName", (buf.validate.field).string.min_len = 1];
  string content_type = 2 [json_name = "contentType", (buf.validate.field).string.min_len = 1];
  int64 file_size = 3 [json_name = "fileSize", (buf.validate.field).int64.gt = 0];
}

message EvidenceConfirmUploadRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
}

message EvidenceItemRequest {
  string url = 1 [(buf.validate.field).string.min_len = 1];
  string file_name = 2 [json_name = "fileName", (buf.validate.field).string.min_len = 1];
  string file_type = 3 [json_name = "fileType"];
  int64 file_size = 4 [json_name = "fileSize"];
}

message SubmitEvidenceRequest {
  repeated EvidenceItemRequest evidence = 1 [(buf.validate.field).repeated.min_items = 1];
}

message BulkDeleteRequest {
  repeated string keys = 1 [(buf.validate.field).repeated.min_items = 1];
}

// --- Responses ---

message PresignUploadResponse {
  string presigned_url = 1 [json_name = "presignedUrl"];
  string key = 2;
  google.protobuf.Timestamp expires_at = 3 [json_name = "expiresAt"];
  string method = 4;
  map<string, string> required_headers = 5 [json_name = "requiredHeaders"];
}

message UploadResponse {
  string key = 1;
  string url = 2;
  string file_name = 3 [json_name = "fileName"];
  int64 size = 4;
  string content_type = 5 [json_name = "contentType"];
}

message EvidencePresignUploadEnvelopeResponse {
  int32 status = 1;
  string presigned_url = 2 [json_name = "presignedUrl"];
  string key = 3;
  google.protobuf.Timestamp expires_at = 4 [json_name = "expiresAt"];
  string method = 5;
  map<string, string> required_headers = 6 [json_name = "requiredHeaders"];
}

message EvidenceConfirmUploadEnvelopeResponse {
  int32 status = 1;
  string key = 2;
  string url = 3;
  string file_name = 4 [json_name = "fileName"];
  int64 size = 5;
  string content_type = 6 [json_name = "contentType"];
}

message StorageFileResponse {
  string key = 1;
  string name = 2;
  int64 size = 3;
  string content_type = 4 [json_name = "contentType"];
  google.protobuf.Timestamp last_modified = 5 [json_name = "lastModified"];
  string url = 6;
}

message StorageFilesResponse {
  repeated StorageFileResponse files = 1;
}

message StorageBulkDeleteResponse {
  int32 deleted = 1;
}

message StorageSyncResponse {
  int32 synced = 1;
}

message StorageDownloadUrlResponse {
  string url = 1;
}

message StorageQuotaResponse {
  int64 used_bytes = 1 [json_name = "usedBytes"];
  int64 max_bytes = 2 [json_name = "maxBytes"];
  double used_percentage = 3 [json_name = "usedPercentage"];
  string used_formatted = 4 [json_name = "usedFormatted"];
  string max_formatted = 5 [json_name = "maxFormatted"];
  map<string, int64> by_type = 6 [json_name = "byType"];
  AiQuotaInfo ai_quota = 7 [json_name = "aiQuota"];
  bool is_premium = 8 [json_name = "isPremium"];
  double storage_overage_rate = 9 [json_name = "storageOverageRate"];
}

message MediaConfigResponse {
  bool backblaze_configured = 1 [json_name = "backblazeConfigured"];
  map<string, MediaSupportedTypes> supported_types = 2 [json_name = "supportedTypes"];
  map<string, int64> file_size_limits = 3 [json_name = "fileSizeLimits"];
  optional string cdn_domain = 4 [json_name = "cdnDomain"];
}

message MediaSupportedTypes {
  repeated string types = 1;
}

message EvidenceUploadTokenValidationResponse {
  int32 status = 1;
  string punishment_id = 2 [json_name = "punishmentId"];
  string player_name = 3 [json_name = "playerName"];
  string issuer_name = 4 [json_name = "issuerName"];
}

message EvidenceSubmitResponse {
  int32 status = 1;
  string message = 2;
}

message AiQuotaInfo {
  int64 total_used = 1 [json_name = "totalUsed"];
  int64 base_limit = 2 [json_name = "baseLimit"];
  int64 overage_used = 3 [json_name = "overageUsed"];
  double overage_cost = 4 [json_name = "overageCost"];
  bool can_use_ai = 5 [json_name = "canUseAI"];
  double usage_percentage = 6 [json_name = "usagePercentage"];
  map<string, int64> by_service = 7 [json_name = "byService"];
}
