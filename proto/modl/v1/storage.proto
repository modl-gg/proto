syntax = "proto3";
package modl.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

message PresignUploadRequest {
  string upload_type = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  string file_name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  int64 file_size = 3 [(buf.validate.field).int64.gt = 0];
  string content_type = 4 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  optional string entity_id = 5 [(buf.validate.field).string.max_len = 64];
  optional string access_token = 6 [(buf.validate.field).string.max_len = 512];
}

message PresignUploadResponse {
  string presigned_url = 1;
  string key = 2;
  string method = 3;
  google.protobuf.Timestamp expires_at = 4;
  map<string, string> required_headers = 5;
}

message ConfirmUploadRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
  string etag = 2 [(buf.validate.field).string.min_len = 1];
  optional string entity_id = 3 [(buf.validate.field).string.max_len = 64];
}

message UploadResponse {
  string key = 1;
  string url = 2;
  google.protobuf.Timestamp uploaded_at = 3;
  int64 file_size = 4;
}

message EvidencePresignUploadRequest {
  string file_name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  string content_type = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  int64 file_size = 3 [(buf.validate.field).int64.gt = 0];
}

message EvidenceItemRequest {
  string type = 1;
  optional string text = 2;
  optional string url = 3;
  optional int64 file_size = 4;
}

message SubmitEvidenceRequest {
  repeated EvidenceItemRequest evidence = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 10}];
  google.protobuf.Struct metadata = 2;
}

message BulkDeleteRequest {
  repeated string keys = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 100}];
}

message StorageFileResponse {
  string key = 1;
  string file_name = 2;
  string content_type = 3;
  int64 file_size = 4;
  google.protobuf.Timestamp uploaded_at = 5;
  string uploaded_by = 6;
}

message StorageQuotaResponse {
  int64 total_bytes = 1;
  int64 used_bytes = 2;
  int64 available_bytes = 3;
  double percentage_used = 4;
}
