name: Publish to Nexus

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use current version)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update version from input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          # Update Gradle version
          sed -i "s/version = \".*\"/version = \"${{ github.event.inputs.version }}\"/" build.gradle.kts
          # Update npm version in template
          sed -i 's/"version": ".*"/"version": "${{ github.event.inputs.version }}"/' scripts/ts-package.json

      - name: Install npm dependencies
        run: npm ci

      - name: Generate protobuf code
        run: |
          npm run generate
          cp scripts/ts-package.json gen/ts/package.json

      - name: Build Java with Gradle
        run: ./gradlew build

      - name: Publish Java to Nexus
        run: ./gradlew publish
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASS }}

      - name: Configure npm for Nexus
        run: |
          echo "//nexus.modl.gg/repository/npm-releases/:_auth=$(echo -n '${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }}' | base64)" >> ~/.npmrc
          echo "//nexus.modl.gg/repository/npm-releases/:always-auth=true" >> ~/.npmrc
          echo "@modl-gg:registry=https://nexus.modl.gg/repository/npm-releases/" >> ~/.npmrc

      - name: Publish TypeScript to Nexus
        working-directory: gen/ts
        run: npm publish
